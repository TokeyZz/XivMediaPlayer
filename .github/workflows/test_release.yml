on:
  push:
    tags:
      - 'testing_*'

name: Testing Release

jobs:
  release:
    name: Testing Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive
          token: ${{ secrets.RELEASE }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '10.x.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: |
          $ver = '${{ github.ref }}' -replace 'refs/tags/testing_','' -replace '^v',''
          dotnet build --no-restore -c Release --nologo -p:Version=$ver

      - name: Write version into manifest
        run: |
          $ver = '${{ github.ref }}' -replace 'refs/tags/testing_','' -replace '^v',''
          $path = './XivMediaPlayer/bin/x64/Release/XivMediaPlayer.json'
          $content = get-content -path $path
          $content = $content -replace '0.0.0.0',$ver
          set-content -Path $path -Value $content

      - name: Packing Release
        run: |
          pushd XivMediaPlayer/bin/x64/Release/

          # Remove native dependencies (cef/libvlc are borrowed from upstream release)
          rm -rf cef libvlc

          # Remove duplicate native CEF binaries from the root directory
          rm -f *.pak *.dat *.bin libcef.dll libGLESv2.dll libEGL.dll vk_swiftshader.dll vk_swiftshader_icd.json chrome_elf.dll d3dcompiler_47.dll dxcompiler.dll dxil.dll libvulkan-1.*

          # Delete any latest.zip
          find . -name "latest.zip" -type f -delete

          # Zip only the managed plugin files (Dependencies borrowed from upstream)
          7z a ../XivMediaPlayer.zip *

          popd
        shell: bash

      - name: Create Release
        uses: ncipollo/release-action@v1.12.0
        with:
          name: XivMediaPlayer ${{ github.ref_name }} (Testing)
          artifacts: "./XivMediaPlayer/bin/x64/*.zip"
          tag: ${{ github.ref_name }}
          prerelease: true
          body: "⚠️ **Testing build** — opt-in via Dalamud settings (/xlsettings → Experimental → Get plugin testing builds). Do not install manually."
          omitBodyDuringUpdate: true
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.RELEASE }}

      - name: Write out repo.json
        run: |
          $ver = '${{ github.ref_name }}' -replace 'testing_','' -replace '^v',''
          $tag = '${{ github.ref_name }}'
          $path = './repo.json'
          $json = Get-Content -Raw $path | ConvertFrom-Json
          $json[0].TestingAssemblyVersion = $ver
          $json[0].DownloadLinkTesting = "https://github.com/TokeyZz/XivMediaPlayer/releases/download/$tag/XivMediaPlayer.zip"
          $content = ConvertTo-Json @($json) -Depth 10
          set-content -Path $path -Value $content

      - name: Commit repo.json
        run: |
          git config --global user.name "Actions User"
          git config --global user.email "actions@github.com"
          git fetch origin main
          git checkout -B main origin/main
          git add repo.json
          git commit -m "[CI] Updating repo.json for testing build ${{ github.ref_name }}" || true
          git push origin main
