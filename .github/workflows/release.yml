on:
  workflow_dispatch:
    inputs: {}
  push:
    tags:
      - '*'
      - '!testing_*'

name: Release

jobs:
  release:
    name: Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive
          token: ${{ secrets.RELEASE }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '10.x.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: |
          $ver = '${{ github.ref }}' -replace 'refs/tags/','' -replace '^v',''
          dotnet build --no-restore -c Release --nologo -p:Version=$ver

      - name: Write version into manifest
        run: |
          $ver = '${{ github.ref }}' -replace 'refs/tags/','' -replace '^v',''
          $path = './XivMediaPlayer/bin/x64/Release/XivMediaPlayer.json'
          $content = get-content -path $path
          $content = $content -replace '0.0.0.0',$ver
          set-content -Path $path -Value $content

      - name: Packing Release
        run: |
          pushd XivMediaPlayer/bin/x64/Release/
          
          # Zip the heavy native dependencies into a separate file
          7z a ../XivMediaPlayer-Dependencies.zip cef libvlc
          
          # Remove them from the output directory
          rm -rf cef libvlc
          
          # Remove duplicate native CEF binaries from the root directory to save space
          rm -f *.pak *.dat *.bin libcef.dll libGLESv2.dll libEGL.dll vk_swiftshader.dll vk_swiftshader_icd.json chrome_elf.dll d3dcompiler_47.dll dxcompiler.dll dxil.dll
          
          # Delete any latest.zip generated by DalamudPackager (which might be inside the XivMediaPlayer subfolder)
          find . -name "latest.zip" -type f -delete
          
          # Zip the lightweight managed plugin files
          7z a ../XivMediaPlayer.zip *
          
          popd
        shell: bash

      - name: Create Release
        uses: ncipollo/release-action@v1.12.0
        with:
          name: XivMediaPlayer ${{ github.ref_name }}
          artifacts: "./XivMediaPlayer/bin/x64/*.zip"
          tag: ${{ github.ref_name }}
          body: "A build of the XivMediaPlayer plugin. Do not install this manually. Install via the dalamud repo link!"
          omitBodyDuringUpdate: true
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.RELEASE }}

      - name: Write out repo.json
        run: |
          $ver = '${{ github.ref_name }}' -replace '^v',''
          $path = './repo.json'
          $json = Get-Content -Raw $path | ConvertFrom-Json
          $json[0].AssemblyVersion = $ver
          $json[0].TestingAssemblyVersion = $ver
          $json[0].DownloadLinkInstall = $json[0].DownloadLinkInstall -replace '[^/]+/XivMediaPlayer.zip',"$ver/XivMediaPlayer.zip"
          $json[0].DownloadLinkTesting = $json[0].DownloadLinkTesting -replace '[^/]+/XivMediaPlayer.zip',"$ver/XivMediaPlayer.zip"
          $json[0].DownloadLinkUpdate = $json[0].DownloadLinkUpdate -replace '[^/]+/XivMediaPlayer.zip',"$ver/XivMediaPlayer.zip"
          $content = ConvertTo-Json @($json) -Depth 10
          set-content -Path $path -Value $content

      - name: Commit repo.json
        run: |
          git config --global user.name "Actions User"
          git config --global user.email "actions@github.com"
          git fetch origin main
          git branch -f main ${{ github.sha }}
          git checkout main
          git add repo.json
          git commit -m "[CI] Updating repo.json for ${{ github.ref_name }}" || true
          git push origin main
